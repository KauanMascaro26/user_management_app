<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">

        <h1>User Management</h1>

        <form id="user-form">

            <input
                type="text"
                id="name"
                placeholder="Name"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <button type="submit">
                Save User
            </button>

        </form>

        <hr>

        <h2>Users</h2>

        <div id="users-list"></div>

    </div>

    <script src="js/app.js"></script>

</body>
</html>
