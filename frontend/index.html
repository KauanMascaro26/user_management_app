<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de usuários</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">

        <div class="top-section">

            <div class="left-panel">

                <h1>Gestão de Usuários</h1>

                <p class="subtitle">
                    Cadastro de usuários com captura <br> e validação facial por inteligência artificial.
                </p>

            </div>

            <div class="right-panel">

                <form id="user-form">

                    <label for="name">Nome</label>
                    <input
                        type="text"
                        id="name"
                        placeholder="Digite seu nome"
                        required
                    >

                    <label for="email">E-mail</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="exemplo@email.com"
                        required
                    >

                    <h3>Foto do Usuário</h3>
                    
                    <video
                        id="video"
                        autoplay
                    ></video>
                    <img id="photo-preview">
                    <p id="face-status">
                        Câmera não iniciada
                    </p>

                    <div class="camera-buttons">

                        <button
                            type="button"
                            id="start-camera"
                        >
                            Abrir Câmera
                        </button>

                        <button
                            type="button"
                            id="capture-photo"
                        >
                            Capturar Foto
                        </button>

                    </div>
                    <button
                        type="button"
                        id="retake-photo"
                        style="display:none;"
                    >
                        Tirar Nova Foto
                    </button>
                    <canvas
                        id="canvas"
                        width="320"
                        height="240"
                        style="display:none;"
                    ></canvas>

                    

                    <button type="submit">
                        Salvar Usuário
                    </button>

                </form>

            </div>

        </div>

        <hr>

        <h2>Usuários Cadastrados</h2>

        <div id="users-list"></div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
